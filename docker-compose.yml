version: '3.8'

services:
  database_node:
    image: mongo:6.0
    container_name: sketch_ai_db_container
    environment:
      # Automatically initializes a root database administrator on startup
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: securepassword
      MONGO_INITDB_DATABASE: sketch_ai
    ports:
      - "27018:27017"
    volumes:
      - mongo_production_data:/data/db
    networks:
      - application_topology_network

  application_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sketch_ai_app_container
    environment:
      # Passes the exact authenticated route link mapping into the runtime variables
      - MONGO_URI=mongodb://root:securepassword@database_node:27018/sketch_ai?authSource=admin
      - SECRET_KEY=supersecretkey
      - GEMINI_API_KEY=your_gemini_api_key_here
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - database_node
    networks:
      - application_topology_network

volumes:
  mongo_production_data:

networks:
  application_topology_network:
    driver: bridge