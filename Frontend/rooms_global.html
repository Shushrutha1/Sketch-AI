<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch.AI — Public Lobbies</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Layout Theme System Style Roots */
        .theme-dark {
            --bg-main: #040712;
            --bg-card: rgba(11, 17, 34, 0.6);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
        }
        
        .theme-light {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }
        .custom-card { 
            background-color: var(--bg-card); 
            border: 1px solid var(--border-color); 
            backdrop-filter: blur(12px);
        }
        .custom-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(45, 212, 191, 0.2);
        }
        .text-muted { color: var(--text-muted); }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-cascade { 
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* ==================== PREMIUM BREATHING PULSE DOT SYSTEM ==================== */
        @keyframes dotBreathingGlow {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .live-glowing-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: dotBreathingGlow 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="theme-dark min-h-screen p-4 sm:p-8 flex flex-col justify-between antialiased" id="bodyThemeTag">

    <div class="max-w-6xl mx-auto w-full flex-1">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 border-b border-gray-800/40 pb-6 anim-cascade">
            <div class="text-left">
                <a href="dashboard.html" class="text-xs font-bold text-teal-400 hover:text-teal-300 transition flex items-center gap-1">
                    <span>&larr; Return to Dashboard</span>
                </a>
                <h1 class="text-2xl font-extrabold text-white tracking-tight mt-1.5">Global Matchmaking Channels</h1>
                <p class="text-xs text-muted mt-0.5">Browse active open network pipelines or spin up a fresh target arena session.</p>
            </div>
            
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <button onclick="togglePageTheme()" class="p-2.5 rounded-xl bg-gray-500/10 hover:bg-gray-500/20 text-xs font-semibold focus:outline-none transition" id="themeBtnToggle">
                    ☀️ Light Mode
                </button>

                <button onclick="createNewPublicRoom()" class="flex-1 sm:flex-none bg-gradient-to-r from-teal-400 to-cyan-500 text-gray-950 px-5 py-2.5 rounded-xl text-xs font-black tracking-wider uppercase shadow-lg hover:brightness-110 active:scale-95 transition focus:outline-none">
                    + Spin Public Room
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="globalRoomsWrapper">
            <div class="text-xs font-mono text-gray-500 animate-pulse col-span-full py-12 text-center">
                Querying live cluster topology streams...
            </div>
        </div>
    </div>

    <footer class="w-full max-w-6xl mx-auto text-center text-xs text-muted pt-12 pb-2 border-t border-gray-500/10">
        &copy; 2026 Sketch.AI Platform. Public session indexing loops running cleanly.
    </footer>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        function togglePageTheme() {
            const body = document.getElementById('bodyThemeTag');
            const toggleBtn = document.getElementById('themeBtnToggle');
            if (body.classList.contains('theme-dark')) {
                body.classList.remove('theme-dark'); body.classList.add('theme-light');
                toggleBtn.innerText = "🌙 Dark Mode"; localStorage.setItem('theme_preference', 'light');
            } else {
                body.classList.remove('theme-light'); body.classList.add('theme-dark');
                toggleBtn.innerText = "☀️ Light Mode"; localStorage.setItem('theme_preference', 'dark');
            }
        }

        async function fetchGlobalRooms() {
            const cachedTheme = localStorage.getItem('theme_preference');
            if (cachedTheme === 'light') togglePageTheme();

            const token = localStorage.getItem('token');
            if(!token) { window.location.href = 'login.html'; return; }

            try {
                const response = await fetch(`${window.location.origin}/api/rooms`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                let rooms = response.ok ? await response.json() : [];

                const wrapper = document.getElementById('globalRoomsWrapper');
                wrapper.innerHTML = '';

                // Filter loop strips private rooms safely
                const publicActiveRooms = rooms.filter(r => !r.room_id.startsWith('PVT-'));

                if(publicActiveRooms.length === 0) {
                    wrapper.innerHTML = `
                        <div class="col-span-full py-16 text-center custom-card rounded-2xl p-6 border-dashed border-gray-800">
                            <p class="text-sm font-bold text-muted">No active public lobbies found.</p>
                            <p class="text-xs text-gray-500 mt-1">Click the button above to host the first channel session!</p>
                        </div>`;
                    return;
                }

                publicActiveRooms.forEach((r, idx) => {
                    const verifiedActivePlayers = r.players_count !== undefined ? r.players_count : 0;
                    
                    let statusBadgeHTML = '';
                    
                    // FIXED BADGE GATEWAY: Turns into breathing live dot if room has active players
                    if (verifiedActivePlayers > 0) {
                        statusBadgeHTML = `
                            <div class="flex items-center space-x-2 bg-green-500/5 border border-green-500/20 px-2.5 py-1 rounded-lg">
                                <span class="live-glowing-dot"></span>
                                <span class="text-[10px] font-bold text-green-400 tracking-wide uppercase">IN GAME</span>
                            </div>`;
                    } else {
                        // Empty Slot Indicator
                        statusBadgeHTML = `
                            <div class="flex items-center space-x-2 bg-gray-500/5 border border-gray-500/10 px-2.5 py-1 rounded-lg">
                                <span class="w-2 h-2 rounded-full bg-gray-600"></span>
                                <span class="text-[10px] font-bold text-muted tracking-wide uppercase">EMPTY LOBBY</span>
                            </div>`;
                    }

                    const delayStyle = `animation-delay: ${idx * 0.05}s; opacity: 0;`;

                    wrapper.innerHTML += `
                        <div onclick="window.location.href='room.html?room=${encodeURIComponent(r.room_id)}'" 
                             class="custom-card p-5 rounded-2xl flex flex-col justify-between min-h-[140px] cursor-pointer text-left anim-cascade hover:border-teal-400/40 transition duration-150"
                             style="${delayStyle}">
                            <div>
                                <div class="flex justify-between items-center gap-2 mb-3">
                                    <h4 class="font-extrabold text-sm text-gray-200 truncate max-w-[140px]" title="${r.room_id}">${r.room_id}</h4>
                                    ${statusBadgeHTML}
                                </div>
                                <p class="text-xs text-muted leading-normal">Click to enter the drawing canvas node workspace matching this active cluster partition.</p>
                            </div>
                            <div class="flex justify-between items-center text-[11px] pt-3 border-t border-gray-800/60 mt-4">
                                <span class="text-muted font-medium">Players Connected: <span class="font-bold text-teal-400 font-mono text-xs pl-0.5">${verifiedActivePlayers}/10</span></span>
                                <span class="text-teal-400 font-bold tracking-wide text-xs hover:text-teal-300 transition flex items-center">Join &rarr;</span>
                            </div>
                        </div>`;
                });
            } catch(e) { 
                console.error("Lobbies rendering error:", e); 
            }
        }

        function createNewPublicRoom() {
            const name = prompt("Enter a labels tag for your new public game room:");
            if(name && name.trim() !== "") {
                window.location.href = `room.html?room=${encodeURIComponent(name.trim().replace(/\s+/g, '-'))}`;
            }
        }

        window.onload = fetchGlobalRooms;
    </script>
</body>
</html>
